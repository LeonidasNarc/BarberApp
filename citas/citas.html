<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Citas - BarberApp</title>
    <link rel="stylesheet" href="citas.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>BarberApp</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../clientes/clientes.html">Clientes</a></li>
                    <li><a href="#" class="active">Citas</a></li>
                    <li><a href="../servicios/servicios.html">Servicios</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="logout-btn">Cerrar Sesión</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title">Gestión de Citas</h1>
                <button id="btnNuevaCita" class="btn-primary">Nueva Cita</button>
            </header>

            <div class="panel">
                <div class="panel-header" style="padding: 24px; border-bottom: 1px solid #eeeeee;">
                    <input id="searchCitas" type="text" placeholder="Buscar por cliente o servicio..."
                        style="width:100%; padding:14px; border:1px solid #e0e0e0; border-radius:8px; font-size:15px; background:#f9f9f9;" />
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Servicio</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaCitas">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="modalCita" class="modal">
        <div class="modal-content panel">
            <div class="modal-header">
                <h2>Registrar Cita</h2>
                <button id="btnCerrarModal" class="btn-close">&times;</button>
            </div>
            <form id="registroForm">
                <div id="formGrid" class="form-grid">
                    <div class="form-group full-width">
                        <label for="clienteId">Cliente:</label>
                        <select id="clienteId" name="clienteId" required>
                            <option value="">Seleccione un cliente</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="servicioId">Servicio:</label>
                        <select id="servicioId" name="servicioId" required>
                            <option value="">Seleccione un servicio</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fecha">Fecha:</label>
                        <input type="date" id="fecha" name="fecha" required>
                    </div>
                    <div class="form-group">
                        <label for="hora">Hora:</label>
                        <input type="time" id="hora" name="hora" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn-primary full-width">Guardar Cita</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content panel">
            <div class="modal-header">
                <h2>Confirmar eliminación</h2>
                <button id="btnCerrarConfirm" class="btn-close">&times;</button>
            </div>
            <div class="confirm-body">
                <p>¿Está seguro de que desea eliminar esta cita?</p>
            </div>
            <div class="modal-footer confirm-actions">
                <button id="btnCancelarEliminar" type="button" class="btn-secondary">Cancelar</button>
                <button id="btnConfirmarEliminar" type="button" class="btn-primary btn-danger">Eliminar</button>
            </div>
        </div>
    </div>

    <div id="alertModal" class="modal">
        <div class="modal-content panel">
            <div class="modal-header">
                <h2>Aviso</h2>
                <button id="btnCerrarAlert" class="btn-close">&times;</button>
            </div>
            <div class="confirm-body">
                <p id="alertMessage"></p>
            </div>
            <div class="modal-footer" style="justify-content: flex-end;">
                <button id="btnAceptarAlert" type="button" class="btn-primary">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="citas.js"></script>
</body>

</html>
