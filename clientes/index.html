<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - BarberApp</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>BarberApp</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../clientes/index.html" class="active">Clientes</a></li>
                    <li><a href="../citas/index.html">Citas</a></li>
                    <li><a href="../servicios/servicios.html">Servicios</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="logout-btn">Cerrar Sesión</a>
            </div>
        </aside>
        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title">Gestión de Clientes</h1>
                <button id="btnNuevoCliente" class="btn-primary">Nuevo Cliente</button>
            </header>
            <div class="panel">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Nombre Completo</th>
                                <th>Teléfono</th>
                                <th>Email</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaClientes">
                        </tbody>
                    </table>
                    <div id="modalCliente" class="modal">
                        <div class="modal-content panel">
                            <div class="modal-header">
                                <h2>Registrar Cliente</h2>
                                <button id="btnCerrarModal" class="btn-close">&times;</button>
                            </div>
                            <form id="registroForm">
                                <div id="formGrid" class="form-grid">
                                    <div class="form-group">
                                        <label for="nombres">Nombres:</label>
                                        <input type="text" id="nombres" name="nombres" placeholder="Ej. Leonidas"
                                            required>
                                    </div>
                                    <div class="form-group">
                                        <label for="apellidos">Apellidos:</label>
                                        <input type="text" id="apellidos" name="apellidos" placeholder="Ej. Narcisos"
                                            required>
                                    </div>
                                    <div class="form-group">
                                        <label for="dni">DNI:</label>
                                        <input type="text" id="dni" name="dni" placeholder="Ej. 12345678" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="telefono">Teléfono:</label>
                                        <input type="tel" id="telefono" name="telefono" placeholder="Ej. 987654321"
                                            required>
                                    </div>
                                    <div class="form-group full-width">
                                        <label for="email">Email:</label>
                                        <input type="email" id="email" name="email" placeholder="Ej. leo@correo.com"
                                            required>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="submit" class="btn-primary full-width">Guardar Cliente</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <script src="index.js"></script>
</body>

</html>
